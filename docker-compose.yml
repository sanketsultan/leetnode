services:

  backend:
    image: ${DOCKERHUB_USERNAME}/leetnode-backend:latest
    restart: unless-stopped
    # t3.medium: 2 vCPU / 4 GB RAM
    # Service budget: backend 192MB / frontend 256MB / nginx 32MB
    # Problem containers: up to 10 x 256MB = 2.56GB concurrent max
    mem_limit: 192m
    memswap_limit: 192m
    cpus: "0.4"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./problems:/problems:ro
      - /dev/shm:/dev/shm   # share host tmpfs so backend can write clean hosts files for containers
    environment:
      NODE_ENV: production
      PORT: "3001"
      WS_PORT: "3002"
      WS_PUBLIC_URL: wss://${DOMAIN}/ws
      FRONTEND_URL: https://${DOMAIN}
      SESSION_TTL_MS: "1200000"
      MAX_SESSIONS: "10"
      DOCKER_SOCKET: /var/run/docker.sock
      # Email / feedback — set in .env on the EC2 host
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
      FEEDBACK_TO: "${FEEDBACK_TO:-}"

  frontend:
    image: ${DOCKERHUB_USERNAME}/leetnode-frontend:latest
    restart: unless-stopped
    mem_limit: 256m
    memswap_limit: 256m
    cpus: "0.4"
    environment:
      NODE_ENV: production
      PORT: "3000"
      BACKEND_URL: http://backend:3001
      NEXTAUTH_URL: "${NEXTAUTH_URL:-}"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET:-}"
      GH_CLIENT_ID: "${GH_CLIENT_ID:-}"
      GH_CLIENT_SECRET: "${GH_CLIENT_SECRET:-}"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    mem_limit: 32m
    memswap_limit: 32m
    cpus: "0.1"
    ports:
      - "80:80"
    volumes:
      - ./nginx/docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
