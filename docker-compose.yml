services:

  backend:
    image: ${DOCKERHUB_USERNAME}/leetnode-backend:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      NODE_ENV: production
      PORT: "3001"
      WS_PORT: "3002"
      WS_PUBLIC_URL: wss://${DOMAIN}/ws
      FRONTEND_URL: https://${DOMAIN}
      SESSION_TTL_MS: "1800000"
      MAX_SESSIONS: "20"
      DOCKER_SOCKET: /var/run/docker.sock

  frontend:
    image: ${DOCKERHUB_USERNAME}/leetnode-frontend:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      BACKEND_URL: http://backend:3001

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
