version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3001"
      - "3002:3002"
    volumes:
      - ./backend/src:/app/src
      - ./problems:/problems
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PORT=3001
      - WS_PORT=3002
      - FRONTEND_URL=http://localhost:3000
      - WS_PUBLIC_URL=ws://localhost:3002
      - PROBLEMS_DIR=/problems
    depends_on: []

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
