name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── 1. Tests must pass ─────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: cd backend && npm ci
      - run: cd backend && npm test -- --no-coverage --forceExit

  # ── 2. Build & push all images ─────────────────────────────────────────────
  build-images:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Backend
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/leetnode-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      # Frontend — NEXT_PUBLIC_ vars baked in at build time
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/leetnode-frontend:latest
          build-args: |
            NEXT_PUBLIC_POSTHOG_KEY=${{ secrets.POSTHOG_KEY }}
            NEXT_PUBLIC_POSTHOG_HOST=https://eu.i.posthog.com
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      # Check if docker/ files changed (decides whether to rebuild base images)
      - name: Check for docker/ changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docker:
              - 'docker/**'

      # Slim base — only when docker/ files change
      - name: Build and push slim base image
        if: steps.filter.outputs.docker == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./docker/base
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/leetnode-base:latest
          cache-from: type=gha,scope=base
          cache-to: type=gha,scope=base,mode=max

      # ML base (torch) — only when docker/ files change
      # Uses plain docker build so it can see the locally-tagged slim base
      - name: Build and push ML base image
        if: steps.filter.outputs.docker == 'true'
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/leetnode-base:latest
          docker tag  ${{ secrets.DOCKERHUB_USERNAME }}/leetnode-base:latest leetnode-base:latest
          docker build -t "${{ secrets.DOCKERHUB_USERNAME }}/leetnode-base-ml:latest" ./docker/base-ml
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/leetnode-base-ml:latest"

      # Problem images — always build so EC2 always has the latest
      # Uses plain docker build (not buildx) so it can see locally-tagged bases
      - name: Build and push problem images
        run: |
          # Pull both bases and retag without username prefix so Dockerfiles' FROM works
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/leetnode-base:latest
          docker tag  ${{ secrets.DOCKERHUB_USERNAME }}/leetnode-base:latest leetnode-base:latest

          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/leetnode-base-ml:latest 2>/dev/null && \
            docker tag "${{ secrets.DOCKERHUB_USERNAME }}/leetnode-base-ml:latest" leetnode-base-ml:latest || true

          for dir in docker/problems/*/; do
            name=$(basename "$dir")
            image="${{ secrets.DOCKERHUB_USERNAME }}/leetnode-problem-$name:latest"
            echo "==> Building $image..."
            docker build -t "$image" "$dir"
            docker push "$image"
            echo "Done: $name"
          done

  # ── 3. Deploy Cloudflare Worker ────────────────────────────────────────────
  deploy-worker:
    name: Deploy feedback Worker
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install worker deps
        run: cd workers/feedback && npm ci

      - name: Deploy Worker + set secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          cd workers/feedback
          echo "${{ secrets.RESEND_API_KEY }}"  | npx wrangler secret put RESEND_API_KEY
          echo "${{ secrets.FEEDBACK_TO }}"     | npx wrangler secret put FEEDBACK_TO
          echo "https://leetnode.io"            | npx wrangler secret put ALLOWED_ORIGIN
          npx wrangler deploy

  # ── 4. Deploy to EC2 ───────────────────────────────────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [build-images, deploy-worker]

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            APP="/opt/leetnode"
            DH_USER="${{ secrets.DOCKERHUB_USERNAME }}"

            echo "==> Writing .env"
            cd "$APP"
            printf '%s\n' \
              "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" \
              "DOMAIN=${{ secrets.DOMAIN }}" \
              "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}" \
              "FEEDBACK_TO=${{ secrets.FEEDBACK_TO }}" > .env

            echo "==> Pulling latest code"
            git -c credential.helper='' \
                -c http.extraheader="Authorization: Basic $(echo -n 'x:${{ secrets.GH_PAT }}' | base64)" \
                fetch origin
            git reset --hard origin/$(git rev-parse --abbrev-ref HEAD)

            echo "==> Pruning stopped containers and unused images (frees disk space)"
            docker container prune -f
            docker image prune -af

            echo "==> Pulling service images from Hub"
            docker pull "$DH_USER/leetnode-backend:latest"
            docker pull "$DH_USER/leetnode-frontend:latest"

            echo "==> Pulling base images and tagging for local use"
            docker pull "$DH_USER/leetnode-base:latest" && \
              docker tag "$DH_USER/leetnode-base:latest" leetnode-base:latest || true
            docker pull "$DH_USER/leetnode-base-ml:latest" && \
              docker tag "$DH_USER/leetnode-base-ml:latest" leetnode-base-ml:latest || true

            echo "==> Pulling problem images"
            for dir in docker/problems/*/; do
              name=$(basename "$dir")
              src="$DH_USER/leetnode-problem-$name:latest"
              docker pull "$src" && docker tag "$src" "leetnode-problem-$name:latest" || true
            done

            echo "==> Stopping host nginx (port 80 needed by Docker)"
            sudo systemctl stop nginx || true
            sudo systemctl disable nginx || true

            echo "==> Pulling nginx"
            docker pull nginx:alpine

            echo "==> Restarting with Docker Compose"
            docker compose up -d --pull never

            echo "==> Done at $(date)"
            docker compose ps
            echo "==> Disk usage after deploy:"
            df -h /

      - name: Notify success
        if: success()
        run: echo "Deployed to https://${{ secrets.DOMAIN }}"

      - name: Notify failure
        if: failure()
        run: exit 1
