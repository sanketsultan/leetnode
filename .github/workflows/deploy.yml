name: Deploy

on:
  push:
    branches: [main]

# Only one deploy at a time
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── 1. Tests must pass before we deploy ────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: cd backend && npm ci
      - run: cd backend && npm test -- --no-coverage --forceExit

  # ── 2. Build & push Docker problem images ──────────────────────────────────
  docker-images:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push base image
        uses: docker/build-push-action@v5
        with:
          context: ./docker/base
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/leetnode-base:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
        continue-on-error: true   # base image may not exist yet

      - name: Build and push problem images
        run: |
          for dir in docker/problems/*/; do
            name=$(basename "$dir")
            image="${{ secrets.DOCKERHUB_USERNAME }}/leetnode-problem-$name:latest"
            echo "Building $image..."
            docker buildx build \
              --push \
              --cache-from type=gha,scope=$name \
              --cache-to   type=gha,scope=$name,mode=max \
              -t "$image" \
              "$dir"
          done

  # ── 3. Deploy to EC2 ────────────────────────────────────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [test, docker-images]

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            APP="/opt/leetnode"
            DH_USER="${{ secrets.DOCKERHUB_USERNAME }}"

            echo "==> Pulling latest code"
            cd "$APP"
            git fetch origin main
            git reset --hard origin/main

            echo "==> Pulling latest Docker images"
            docker pull "$DH_USER/leetnode-base:latest" 2>/dev/null || true
            docker tag  "$DH_USER/leetnode-base:latest" leetnode-base:latest 2>/dev/null || true

            for dir in docker/problems/*/; do
              name=$(basename "$dir")
              src="$DH_USER/leetnode-problem-$name:latest"
              dst="leetnode-problem-$name:latest"
              docker pull "$src" && docker tag "$src" "$dst" || true
            done

            echo "==> Building backend"
            cd "$APP/backend"
            npm ci --prefer-offline
            npm run build

            echo "==> Building frontend"
            cd "$APP/frontend"
            NEXT_PUBLIC_POSTHOG_KEY="${{ secrets.POSTHOG_KEY }}" \
            NEXT_PUBLIC_POSTHOG_HOST="https://us.i.posthog.com" \
            npm run build

            echo "==> Restarting services"
            cd "$APP"
            pm2 restart all

            echo "==> Done at $(date)"

      - name: Notify success
        if: success()
        run: echo "Deployed successfully to https://${{ secrets.DOMAIN }}"

      - name: Notify failure
        if: failure()
        run: echo "Deploy failed — check logs above"
