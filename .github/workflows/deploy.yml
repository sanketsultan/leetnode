name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── 1. Tests ────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: cd backend && npm ci
      - run: cd backend && npm test -- --no-coverage --forceExit

  # ── 2a. Build backend (parallel with frontend) ──────────────────────────────
  build-backend:
    name: Build backend image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/leetnode-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

  # ── 2b. Build frontend (parallel with backend) ──────────────────────────────
  build-frontend:
    name: Build frontend image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/leetnode-frontend:latest
          build-args: |
            NEXT_PUBLIC_POSTHOG_KEY=${{ secrets.POSTHOG_KEY }}
            NEXT_PUBLIC_POSTHOG_HOST=https://eu.i.posthog.com
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  # ── 2c. Detect changes + enumerate problems (for matrix) ────────────────────
  prepare-problems:
    name: Prepare problem matrix
    runs-on: ubuntu-latest
    needs: test
    outputs:
      problems: ${{ steps.list.outputs.problems }}
      docker_changed: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v4

      - name: Check for docker/ changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docker:
              - 'docker/**'

      - name: List all problem directories
        id: list
        run: |
          problems=$(ls -d docker/problems/*/ | xargs -I{} basename {} | jq -R . | jq -s -c .)
          echo "problems=$problems" >> "$GITHUB_OUTPUT"

  # ── 2d. Build base images (only when docker/ changed) ───────────────────────
  build-base:
    name: Build base images
    runs-on: ubuntu-latest
    needs: prepare-problems
    if: needs.prepare-problems.outputs.docker_changed == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push slim base
        uses: docker/build-push-action@v5
        with:
          context: ./docker/base
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/leetnode-base:latest
          cache-from: type=gha,scope=base
          cache-to: type=gha,scope=base,mode=max

      - name: Build and push ML base (torch)
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/leetnode-base:latest
          docker tag  ${{ secrets.DOCKERHUB_USERNAME }}/leetnode-base:latest leetnode-base:latest
          docker build -t "${{ secrets.DOCKERHUB_USERNAME }}/leetnode-base-ml:latest" ./docker/base-ml
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/leetnode-base-ml:latest"

  # ── 2e. Build problem images in parallel (one runner per problem) ────────────
  build-problems:
    name: Build problem — ${{ matrix.problem }}
    runs-on: ubuntu-latest
    needs: [prepare-problems, build-base]
    # Run even if build-base was skipped (no docker/ changes)
    if: always() && needs.prepare-problems.result == 'success' && (needs.build-base.result == 'success' || needs.build-base.result == 'skipped')
    strategy:
      fail-fast: false   # one failing problem doesn't cancel the rest
      matrix:
        problem: ${{ fromJson(needs.prepare-problems.outputs.problems) }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull base images
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/leetnode-base:latest
          docker tag  ${{ secrets.DOCKERHUB_USERNAME }}/leetnode-base:latest leetnode-base:latest
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/leetnode-base-ml:latest 2>/dev/null && \
            docker tag "${{ secrets.DOCKERHUB_USERNAME }}/leetnode-base-ml:latest" leetnode-base-ml:latest || true

      - name: Build and push ${{ matrix.problem }}
        run: |
          image="${{ secrets.DOCKERHUB_USERNAME }}/leetnode-problem-${{ matrix.problem }}:latest"
          docker build -t "$image" "docker/problems/${{ matrix.problem }}/"
          docker push "$image"

  # ── 3. Deploy Cloudflare Worker (parallel with image builds) ────────────────
  deploy-worker:
    name: Deploy feedback Worker
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install worker deps
        run: cd workers/feedback && npm ci

      - name: Deploy Worker + set secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          cd workers/feedback
          echo "${{ secrets.RESEND_API_KEY }}"  | npx wrangler secret put RESEND_API_KEY
          echo "${{ secrets.FEEDBACK_TO }}"     | npx wrangler secret put FEEDBACK_TO
          echo "https://leetnode.io"            | npx wrangler secret put ALLOWED_ORIGIN
          npx wrangler deploy

  # ── 4. Deploy to EC2 (after all images + worker ready) ──────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, build-problems, deploy-worker]
    # Deploy even if build-problems had individual failures (fail-fast:false)
    if: always() && needs.build-backend.result == 'success' && needs.build-frontend.result == 'success' && needs.deploy-worker.result == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            APP="/opt/leetnode"
            DH_USER="${{ secrets.DOCKERHUB_USERNAME }}"

            echo "==> Writing .env"
            cd "$APP"
            printf '%s\n' \
              "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" \
              "DOMAIN=${{ secrets.DOMAIN }}" \
              "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}" \
              "FEEDBACK_TO=${{ secrets.FEEDBACK_TO }}" \
              "NEXTAUTH_URL=https://${{ secrets.DOMAIN }}" \
              "NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}" \
              "GITHUB_CLIENT_ID=${{ secrets.GH_CLIENT_ID }}" \
              "GITHUB_CLIENT_SECRET=${{ secrets.GH_CLIENT_SECRET }}" > .env

            echo "==> Pulling latest code"
            git -c credential.helper='' \
                -c http.extraheader="Authorization: Basic $(echo -n 'x:${{ secrets.GH_PAT }}' | base64)" \
                fetch origin
            git reset --hard origin/$(git rev-parse --abbrev-ref HEAD)

            echo "==> Pruning stopped containers and unused images (frees disk space)"
            docker container prune -f
            docker image prune -af

            echo "==> Pulling service images"
            docker pull "$DH_USER/leetnode-backend:latest"
            docker pull "$DH_USER/leetnode-frontend:latest"

            echo "==> Pulling base images"
            docker pull "$DH_USER/leetnode-base:latest" && \
              docker tag "$DH_USER/leetnode-base:latest" leetnode-base:latest || true
            docker pull "$DH_USER/leetnode-base-ml:latest" && \
              docker tag "$DH_USER/leetnode-base-ml:latest" leetnode-base-ml:latest || true

            echo "==> Pulling problem images"
            for dir in docker/problems/*/; do
              name=$(basename "$dir")
              src="$DH_USER/leetnode-problem-$name:latest"
              docker pull "$src" && docker tag "$src" "leetnode-problem-$name:latest" || true
            done

            echo "==> Stopping host nginx"
            sudo systemctl stop nginx || true
            sudo systemctl disable nginx || true

            docker pull nginx:alpine

            echo "==> Restarting with Docker Compose"
            docker compose up -d --pull never

            echo "==> Done at $(date)"
            docker compose ps
            df -h /

      - name: Notify success
        if: success()
        run: echo "Deployed to https://${{ secrets.DOMAIN }}"

      - name: Notify failure
        if: failure()
        run: exit 1
