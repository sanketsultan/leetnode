name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── 1. Tests must pass ─────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: cd backend && npm ci
      - run: cd backend && npm test -- --no-coverage --forceExit

  # ── 2. Build & push all images ─────────────────────────────────────────────
  build-images:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Backend
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/leetnode-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      # Frontend — NEXT_PUBLIC_ vars baked in at build time
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/leetnode-frontend:latest
          build-args: |
            NEXT_PUBLIC_POSTHOG_KEY=${{ secrets.POSTHOG_KEY }}
            NEXT_PUBLIC_POSTHOG_HOST=https://eu.i.posthog.com
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      # Problem Docker images (only when docker/ files change)
      - name: Check for docker/ changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docker:
              - 'docker/**'

      - name: Build and push base problem image
        if: steps.filter.outputs.docker == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./docker/base
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/leetnode-base:latest
          cache-from: type=gha,scope=base
          cache-to: type=gha,scope=base,mode=max

      - name: Build and push problem images
        if: steps.filter.outputs.docker == 'true'
        run: |
          for dir in docker/problems/*/; do
            name=$(basename "$dir")
            image="${{ secrets.DOCKERHUB_USERNAME }}/leetnode-problem-$name:latest"
            echo "Building $image..."
            docker buildx build \
              --push \
              --cache-from type=gha,scope=$name \
              --cache-to   type=gha,scope=$name,mode=max \
              -t "$image" \
              "$dir"
          done

  # ── 3. Deploy to EC2 ───────────────────────────────────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build-images

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            APP="/opt/leetnode"
            DH_USER="${{ secrets.DOCKERHUB_USERNAME }}"

            echo "==> Pulling latest code"
            cd "$APP"
            git fetch origin
            git reset --hard origin/$(git rev-parse --abbrev-ref HEAD)

            echo "==> Pulling Docker images from Hub"
            docker pull "$DH_USER/leetnode-backend:latest"
            docker pull "$DH_USER/leetnode-frontend:latest"
            docker pull "$DH_USER/leetnode-base:latest" 2>/dev/null && \
              docker tag "$DH_USER/leetnode-base:latest" leetnode-base:latest || true
            for dir in docker/problems/*/; do
              name=$(basename "$dir")
              src="$DH_USER/leetnode-problem-$name:latest"
              docker pull "$src" && docker tag "$src" "leetnode-problem-$name:latest" || true
            done

            echo "==> Restarting with Docker Compose"
            docker compose up -d --pull never

            echo "==> Done at $(date)"
            docker compose ps

      - name: Notify success
        if: success()
        run: echo "Deployed to https://${{ secrets.DOMAIN }}"

      - name: Notify failure
        if: failure()
        run: exit 1
