services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    # t3.medium resource budget (2 vCPU / 4 GB):
    # OS+Docker ~600MB | nginx 32MB | backend 192MB | frontend 256MB
    # leaves ~2.9GB for up to 10 problem containers @ 256MB each
    mem_limit: 192m
    memswap_limit: 192m
    cpus: "0.4"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./problems:/problems:ro
    environment:
      NODE_ENV: development
      PORT: "3001"
      WS_PORT: "3002"
      WS_PUBLIC_URL: ws://localhost/ws
      FRONTEND_URL: http://localhost
      SESSION_TTL_MS: "1200000"
      MAX_SESSIONS: "10"
      DOCKER_SOCKET: /var/run/docker.sock
      # Email / feedback — set these to enable real email sending
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      FEEDBACK_TO: "${FEEDBACK_TO:-}"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_POSTHOG_KEY: ""
        NEXT_PUBLIC_POSTHOG_HOST: "https://eu.i.posthog.com"
    restart: unless-stopped
    mem_limit: 256m
    memswap_limit: 256m
    cpus: "0.4"
    environment:
      NODE_ENV: production
      PORT: "3000"
      BACKEND_URL: http://backend:3001

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    mem_limit: 32m
    memswap_limit: 32m
    cpus: "0.1"
    ports:
      - "80:80"
    volumes:
      - ./nginx/docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
