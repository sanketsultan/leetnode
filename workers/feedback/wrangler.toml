name       = "leetnode-feedback"
main       = "src/index.ts"
compatibility_date = "2024-09-23"

# Route is set manually in Cloudflare dashboard (Workers & Pages → leetnode-feedback → Settings → Triggers)
# Pattern: leetnode.io/api/feedback  Zone: leetnode.io
# Removing from here avoids needing Zone permission in the CI API token.

# D1 database binding
[[d1_databases]]
binding      = "DB"
database_name = "leetnode"
database_id  = "2749cf3c-03d5-464f-bb59-a609c82e28fe"

# Secrets (set with: npx wrangler secret put RESEND_API_KEY)
# RESEND_API_KEY
# FEEDBACK_TO
# ALLOWED_ORIGIN
