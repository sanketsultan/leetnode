# nginx config for Docker Compose.
# Uses Docker's internal DNS (127.0.0.11) so upstream names are resolved
# at request time — prevents startup failure if backend/frontend aren't up yet.

server {
    listen 80;
    server_name _;

    # Docker's internal DNS resolver
    resolver 127.0.0.11 valid=10s;
    resolver_timeout 5s;

    # WebSocket terminal
    location /ws {
        set $backend backend;
        proxy_pass         http://$backend:3002;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # NextAuth — must be before the general /api/ block
    location /api/auth/ {
        set $frontend frontend;
        proxy_pass         http://$frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # Next.js user API routes (solve recording, profile data)
    location /api/user/ {
        set $frontend frontend;
        proxy_pass         http://$frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # REST API
    location /api/ {
        set $backend backend;
        proxy_pass         http://$backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # Next.js frontend
    location / {
        set $frontend frontend;
        proxy_pass         http://$frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 60s;
    }
}
